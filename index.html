<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组内离差平方和计算器</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .input-section, .result-section {
            margin-top: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        tr.best {
            background-color: #d4efdf !important; /* 绿色高亮 */
            font-weight: bold;
        }
        .explanation {
            background-color: #eaf2f8;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 组内离差平方和计算器</h1>

    <div class="input-section">
        <label for="dataInput">请输入数据（请用英文逗号分隔，建议先从小到大排序）：</label>
        <input type="text" id="dataInput" value="58, 64, 68, 75, 76, 83, 85, 89, 90, 92">
        <button onclick="calculate()">开始计算分组</button>
    </div>

    <div class="result-section">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>分组间隔</th>
                    <th>第一组 (前k个)</th>
                    <th>第二组 (剩余)</th>
                    <th>组内离差平方和 (d1²+d2²)</th>
                    <th>组间离差平方和 (d12²)</th>
                </tr>
            </thead>
            <tbody>
                <!-- 结果将通过JS动态插入 -->
            </tbody>
        </table>
    </div>

    <div class="explanation">
        <strong>💡 教学提示：</strong>
        <p>1. <strong>组内离差平方和最小</strong>：衡量组内的整齐程度，越小越好。</p>
        <p>2. <strong>组间离差平方和最大</strong>：衡量两组之间的差距，越大越好。</p>
        <p>3. 观察下表，<strong style="color:green;">绿色高亮</strong>的一行即为最佳分组点。你会发现当组内平方和最小时，组间平方和一定最大。</p>
    </div>
</div>

<script>
    function calculate() {
        // 1. 获取数据
        const input = document.getElementById('dataInput').value;
        const data = input.split(',')
                         .map(item => parseFloat(item.trim()))
                         .filter(item => !isNaN(item))
                         .sort((a, b) => a - b); // 确保排序

        if (data.length < 2) {
            alert("请输入至少两个有效数字！");
            return;
        }

        const n = data.length;
        const totalMean = data.reduce((a, b) => a + b, 0) / n;
        let results = [];
        let minWithinSS = Infinity;

        // 2. 遍历所有分组可能性
        for (let k = 1; k < n; k++) {
            const group1 = data.slice(0, k);
            const group2 = data.slice(k);

            const mean1 = group1.reduce((a, b) => a + b, 0) / group1.length;
            const mean2 = group2.reduce((a, b) => a + b, 0) / group2.length;

            // 计算组内离差平方和
            const ss1 = group1.reduce((sum, val) => sum + Math.pow(val - mean1, 2), 0);
            const ss2 = group2.reduce((sum, val) => sum + Math.pow(val - mean2, 2), 0);
            const withinSS = ss1 + ss2;

            // 计算组间离差平方和
            const betweenSS = group1.length * Math.pow(mean1 - totalMean, 2) + 
                              group2.length * Math.pow(mean2 - totalMean, 2);
            
            results.push({
                interval: `第 ${k} 个间隔`,
                group1: `[${group1.join(', ')}]`,
                group2: `[${group2.join(', ')}]`,
                withinSS: withinSS.toFixed(2),
                betweenSS: betweenSS.toFixed(2)
            });

            if (withinSS < minWithinSS) {
                minWithinSS = withinSS;
            }
        }

        // 3. 渲染表格
        const tbody = document.querySelector("#resultTable tbody");
        tbody.innerHTML = ""; // 清空旧数据

        results.forEach(row => {
            const tr = document.createElement("tr");
            // 如果是最小值，加上高亮class
            if (parseFloat(row.withinSS) === minWithinSS) {
                tr.className = "best";
            }
            tr.innerHTML = `
                <td>${row.interval}</td>
                <td>${row.group1}</td>
                <td>${row.group2}</td>
                <td><strong>${row.withinSS}</strong></td>
                <td>${row.betweenSS}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 页面加载时自动计算一次
    window.onload = calculate;
</script>

</body>
</html>
